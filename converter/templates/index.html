<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docx Markdown Converter</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="page-shell">
    <main class="workspace">
      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>DOCX to Markdown</h2>
          </div>
          <span class="panel-badge">MarkItDown</span>
        </div>

        <form id="docx-form" class="stack">
          <label class="dropzone">
            <input id="docx-files" type="file" name="files" accept=".docx" multiple>
            <span class="drop-title">DOCX 파일을 끌어오거나 선택하세요</span>
            <span class="drop-subtitle">여러 개를 한 번에 넣어도 됩니다.</span>
          </label>
          <div id="docx-selected" class="selected-files" hidden></div>
          <button type="submit" class="action primary">Markdown으로 변환</button>
        </form>

        <div id="docx-status" class="status" hidden></div>
        <div id="docx-results" class="results"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Markdown to DOCX</h2>
          </div>
          <span class="panel-badge warm">Pandoc</span>
        </div>

        <form id="md-form" class="stack">
          <label class="dropzone">
            <input id="md-files" type="file" name="files" accept=".md,.markdown" multiple>
            <span class="drop-title">Markdown 파일을 끌어오거나 선택하세요</span>
            <span class="drop-subtitle">여러 개를 한 번에 넣어도 됩니다.</span>
          </label>
          <div id="md-selected" class="selected-files" hidden></div>
          <button type="submit" class="action accent">DOCX로 변환</button>
        </form>

        <div id="md-status" class="status" hidden></div>
        <div id="md-results" class="results"></div>
      </section>
    </main>
  </div>

  <template id="result-card-template">
    <article class="result-card">
      <div class="result-head">
        <div>
          <p class="result-label"></p>
          <h3 class="result-title"></h3>
        </div>
        <button type="button" class="download-link">파일 저장</button>
      </div>
      <pre class="preview" hidden></pre>
    </article>
  </template>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>

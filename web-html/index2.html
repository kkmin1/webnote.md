<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 에디터 통합 예제</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #editor { font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.6; }
    iframe { width: 100%; height: 100%; border: none; background: white; }
  </style>
</head>
<body class="bg-zinc-900 text-white">
  <div class="flex h-screen flex-col">
    <!-- 상단 툴바 -->
    <div class="flex flex-col gap-2 px-4 py-3 bg-zinc-800 border-b border-zinc-700">
      <div class="w-full text-center text-3xl font-extrabold text-cyan-300 tracking-normal">
        HTML WIZWIG 에디터
      </div>
      
      <div class="flex w-full items-center justify-end gap-1.5">
        <!-- 로컬 이미지 업로드 -->
        <button onclick="uploadLocalImage()" 
                class="px-2.5 py-1 bg-purple-600 hover:bg-purple-700 rounded text-xs leading-tight">
          로컬 이미지 업로드
        </button>
        
        <!-- 파일 불러오기 -->
        <button onclick="loadFile()" 
                class="px-2.5 py-1 bg-blue-600 hover:bg-blue-700 rounded text-xs leading-tight">
          파일 불러오기
        </button>
        
        <!-- 다른 이름으로 저장 -->
        <button onclick="saveFileAs()" 
                class="px-2.5 py-1 bg-emerald-600 hover:bg-emerald-700 rounded text-xs leading-tight">
          다른 이름으로 저장
        </button>
        
        <button onclick="undo()" 
                class="px-2.5 py-1 bg-amber-600 hover:bg-amber-700 rounded text-xs leading-tight">
          실행 취소
        </button>
        <button onclick="redo()" 
                class="px-2.5 py-1 bg-amber-600 hover:bg-amber-700 rounded text-xs leading-tight">
          다시 실행
        </button>
        <button onclick="openFindModal()" 
                class="px-2.5 py-1 bg-rose-600 hover:bg-rose-700 rounded text-xs leading-tight">
          찾기/바꾸기
        </button>
        <button onclick="formatCode()" 
                class="px-2.5 py-1 bg-cyan-600 hover:bg-cyan-700 rounded text-xs leading-tight">
          코드 정렬
        </button>
        <button onclick="copyToClipboard()" 
                class="px-2.5 py-1 bg-zinc-600 hover:bg-zinc-500 rounded text-xs leading-tight">
          복사
        </button>
        <button onclick="showMathHelp()" 
                class="px-2.5 py-1 bg-zinc-700 hover:bg-zinc-600 rounded text-xs leading-tight">
          도움말
        </button>
      </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
      <!-- 에디터 -->
      <div class="w-1/2 flex flex-col border-r border-zinc-700">
        <div class="flex items-center justify-center px-4 py-3 bg-zinc-800 text-xl font-bold text-amber-300">
          HTML 에디터
        </div>
        <textarea id="editor" class="flex-1 p-4 bg-zinc-950 text-emerald-300 resize-none outline-none font-mono"></textarea>
      </div>

      <!-- 미리보기 -->
      <div class="w-1/2 flex flex-col">
        <div class="flex items-center justify-center px-4 py-3 bg-zinc-800 text-xl font-bold text-sky-300">
          웹페이지 미리보기
        </div>
        <div class="flex-1 bg-white">
          <iframe id="preview"></iframe>
        </div>
      </div>
    </div>
  </div>

  <!-- 찾기/바꾸기 모달 -->
  <div id="findModal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50">
    <div class="bg-zinc-800 border border-zinc-600 rounded-lg shadow-2xl w-80 overflow-hidden">
      <div class="flex items-center justify-between px-4 py-2 bg-zinc-700 border-b border-zinc-600">
        <span class="text-sm font-bold text-cyan-300">찾기 / 바꾸기</span>
        <button onclick="closeFindModal()" class="text-zinc-400 hover:text-white">&times;</button>
      </div>
      <div class="p-4 space-y-3">
        <div class="space-y-1">
          <label class="text-[10px] text-zinc-400 uppercase font-bold">찾을 내용 (Find)</label>
          <input type="text" id="modalFindInput" 
                 class="w-full bg-zinc-900 border border-zinc-600 rounded px-2 py-1 text-sm text-emerald-300 focus:outline-none focus:border-cyan-500">
        </div>
        <div class="space-y-1">
          <label class="text-[10px] text-zinc-400 uppercase font-bold">바꿀 내용 (Replace)</label>
          <input type="text" id="modalReplaceInput" 
                 class="w-full bg-zinc-900 border border-zinc-600 rounded px-2 py-1 text-sm text-amber-300 focus:outline-none focus:border-cyan-500">
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" id="matchCase" class="w-3 h-3 accent-cyan-500">
          <label for="matchCase" class="text-xs text-zinc-300 cursor-pointer">대소문자 구분 (Match case)</label>
        </div>
        <div class="grid grid-cols-2 gap-2 pt-2">
          <button onclick="findNext()" 
                  class="px-3 py-1.5 bg-zinc-700 hover:bg-zinc-600 rounded text-xs border border-zinc-500">
            다음 찾기
          </button>
          <button onclick="replaceCurrent()" 
                  class="px-3 py-1.5 bg-zinc-700 hover:bg-zinc-600 rounded text-xs border border-zinc-500">
            바꾸기
          </button>
          <button onclick="replaceAll()" 
                  class="px-3 py-1.5 bg-rose-600 hover:bg-rose-700 rounded text-xs font-bold">
            모두 바꾸기
          </button>
          <button onclick="closeFindModal()" 
                  class="px-3 py-1.5 bg-zinc-600 hover:bg-zinc-500 rounded text-xs">
            닫기
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 이미지 -->
  <h2>외부 이미지</h2>
  <img src="https://picsum.photos/id/1015/600/300" alt="샘플 이미지" style="max-width:100%; border-radius:8px;">

  <!-- 링크 -->
  <h2>링크</h2>
  <p><a href="https://google.com" target="_blank">Google로 이동</a></p>

  <!-- 간단한 계산기 -->
  <h2>간단한 계산기</h2>
  <div class="calculator">
    <input id="calc-display" type="text" value="0">
    <div class="calc-grid">
      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button class="operator" onclick="append('/')">÷</button>
      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button class="operator" onclick="append('*')">×</button>
      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button class="operator" onclick="append('-')">−</button>
      <button onclick="append('0')">0</button>
      <button class="operator" onclick="clearCalc()">C</button>
      <button class="equals" onclick="calculate()">=</button>
      <button class="operator" onclick="append('+')">+</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('calc-display');
    function append(val) {
      display.value = display.value === '0' ? val : display.value + val;
    }
    function clearCalc() {
      display.value = '0';
    }
    function calculate() {
      try {
        display.value = Function('"use strict"; return (' + display.value + ')')();
      } catch(e) {
        display.value = 'Error';
      }
    }
    console.log('JavaScript도 정상 동작합니다!');
  <\/script>

</body>

    ;

    editor.value = defaultCode;

    // 미리보기 업데이트
    function updatePreview() {
      const doc = preview.contentDocument || preview.contentWindow.document;
      const htmlContent = editor.value;

      const fullHTML = `
        <!DOCTYPE html>
        <html>
        <head>
          <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"><\/script>
        </head>
        <body>
          ${htmlContent}
        </body>
        </html>
      `;

      doc.open();
      doc.write(fullHTML);
      doc.close();
    }

    let timeout;
    editor.addEventListener('input', () => {
      clearTimeout(timeout);
      timeout = setTimeout(() => {
        updatePreview();
        saveState(); // 입력 시 히스토리에 저장
      }, 400);
    });

    window.onload = () => {
      updatePreview();
      saveState(); // 초기 상태 저장
    };

    // 다른 이름으로 저장
    async function saveFileAs() {
      const blob = new Blob([editor.value], { type: 'text/html' });

      if (window.showSaveFilePicker) {
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: 'document.html',
            types: [{
              description: 'HTML 문서',
              accept: { 'text/html': ['.html', '.htm'] }
            }]
          });
          const writable = await handle.createWritable();
          await writable.write(blob);
          await writable.close();
          return;
        } catch (err) {
          if (err.name === 'AbortError') return;
          alert('저장 위치 선택을 사용할 수 없어 기본 다운로드 방식으로 저장합니다.');
        }
      }

      const filename = prompt("저장할 파일명을 입력하세요:", "document.html");
      if (!filename) return;

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    // 파일 불러오기
    function loadFile() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.html,.htm';
      input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = ev => {
          editor.value = ev.target.result;
          updatePreview();
        };
        reader.readAsText(file);
      };
      input.click();
    }

    // 로컬 이미지 업로드
    function uploadLocalImage() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const imageUrl = URL.createObjectURL(file);
        const imgTag = `<img src="${imageUrl}" alt="${file.name}" style="max-width: 100%; border-radius: 8px; margin: 10px 0;">`;
        editor.value = editor.value.replace('</body>', imgTag + '\n</body>');
        updatePreview();
      };
      input.click();
    }

    function showMathHelp() {
      alert(`수식 입력 방법

인라인: \\( E = mc^2 \\)
블록: $$ \\frac{a}{b} = c $$`);
    }

    // --- 추가 기능들 ---

    // 찾기/바꾸기 모달 제어
    function openFindModal() {
      document.getElementById('findModal').classList.remove('hidden');
      document.getElementById('modalFindInput').focus();
      // 현재 선택된 텍스트가 있다면 자동으로 찾기 필드에 입력
      const selected = editor.value.substring(editor.selectionStart, editor.selectionEnd);
      if (selected) {
        document.getElementById('modalFindInput').value = selected;
      }
    }

    function closeFindModal() {
      document.getElementById('findModal').classList.add('hidden');
      editor.focus();
    }

    // 다음 찾기
    function findNext() {
      const findText = document.getElementById('modalFindInput').value;
      const matchCase = document.getElementById('matchCase').checked;
      
      if (!findText) return;
      
      const content = editor.value;
      let searchContent = matchCase ? content : content.toLowerCase();
      let searchTerm = matchCase ? findText : findText.toLowerCase();
      
      let index = searchContent.indexOf(searchTerm, editor.selectionEnd);
      if (index === -1) {
        // 끝까지 갔으면 처음부터 다시 찾기
        index = searchContent.indexOf(searchTerm, 0);
      }
      
      if (index !== -1) {
        editor.focus();
        editor.setSelectionRange(index, index + searchTerm.length);
        // textarea 스크롤 위치 조정 (selectionStart로 이동)
        const lineHeight = 22; // 대략적인 줄 높이
        const charsBefore = editor.value.substr(0, index);
        const linesBefore = charsBefore.split('\n').length;
        editor.scrollTop = (linesBefore - 5) * lineHeight; 
      } else {
        alert("찾는 텍스트가 없습니다.");
      }
    }

    // 현재 선택된 부분 바꾸기
    function replaceCurrent() {
      const findText = document.getElementById('modalFindInput').value;
      const replaceText = document.getElementById('modalReplaceInput').value;
      const matchCase = document.getElementById('matchCase').checked;
      
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const selected = editor.value.substring(start, end);
      
      const isMatch = matchCase ? (selected === findText) : (selected.toLowerCase() === findText.toLowerCase());
      
      if (isMatch && findText) {
        saveState();
        editor.setRangeText(replaceText, start, end, 'select');
        updatePreview();
        findNext(); // 다음 단어로 이동
      } else {
        findNext(); // 매칭 안되어 있으면 일단 다음 찾기 수행
      }
    }

    // 일괄 바꾸기
    function replaceAll() {
      const findText = document.getElementById('modalFindInput').value;
      const replaceText = document.getElementById('modalReplaceInput').value;
      const matchCase = document.getElementById('matchCase').checked;
      
      if (!findText) return;
      
      const content = editor.value;
      let newContent;
      
      if (matchCase) {
        newContent = content.split(findText).join(replaceText);
      } else {
        const regex = new RegExp(findText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
        newContent = content.replace(regex, replaceText);
      }
      
      if (content === newContent) {
        alert("바꿀 내용이 없습니다.");
        return;
      }
      
      saveState();
      editor.value = newContent;
      updatePreview();
      alert("모든 항목을 변경했습니다.");
    }

    // 실행 취소 / 다시 실행 관리
    const history = [];
    const redoStack = [];
    const MAX_HISTORY = 50;

    function saveState() {
      if (history.length === 0 || history[history.length - 1] !== editor.value) {
        history.push(editor.value);
        if (history.length > MAX_HISTORY) history.shift();
        redoStack.length = 0; // 새로운 작업 시 리두 스택 초기화
      }
    }

    // 입력 시 상태 저장 (Debounced)
    let historyTimeout;
    editor.addEventListener('keydown', (e) => {
      // Ctrl+Z, Ctrl+Y 는 브라우저 기본 기능이 우선이지만, 버튼 연동을 위해 체크 가능
      if (e.ctrlKey && e.key === 'z') {
        // 브라우저 기본 undo가 작동함. 버튼으로 하는 것과 별개.
      }
    });

    function undo() {
      if (history.length > 0) {
        redoStack.push(editor.value);
        editor.value = history.pop();
        updatePreview();
      } else {
        // 더 이상 취소할 내용이 없을 때 브라우저 기본 undo 시도
        document.execCommand('undo');
      }
    }

    function redo() {
      if (redoStack.length > 0) {
        history.push(editor.value);
        editor.value = redoStack.pop();
        updatePreview();
      } else {
        document.execCommand('redo');
      }
    }

    // 코드 정렬 (간이 포매터)
    function formatCode() {
      saveState();
      let code = editor.value;
      
      // 간단한 들여쓰기 규칙 (실제로는 정교한 라이브러리가 필요하지만, 여기서는 기본적인 줄바꿈 정렬만 시도)
      // 태그 사이의 공백 정리 및 간단한 들여쓰기
      let formatted = '';
      let pad = 0;
      
      // 태그별로 분리
      const reg = /(>)(<)(\/*)/g;
      code = code.replace(reg, '$1\r\n$2$3');
      
      const lines = code.split('\r\n');
      lines.forEach(line => {
        let indent = 0;
        if (line.match(/.+<\/\w[^>]*>$/)) {
          indent = 0;
        } else if (line.match(/^<\/\w/)) {
          if (pad !== 0) pad -= 1;
        } else if (line.match(/^<\w([^>]*[^\/])?>.*$/)) {
          indent = 1;
        }
        
        formatted += '  '.repeat(pad) + line + '\r\n';
        pad += indent;
      });
      
      editor.value = formatted.trim();
      updatePreview();
    }

    // 클립보드 복사
    function copyToClipboard() {
      editor.select();
      document.execCommand('copy');
      alert("코드가 클립보드에 복사되었습니다.");
    }

    // 초기 상태 저장
    setTimeout(() => {
      if (history.length === 0) history.push(editor.value);
    }, 1000);
  </script>

<html> 
<head> 
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js" type="text/javascript"></script> 
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js" type="text/javascript"></script> 

</head> 

<body> 

<script type="text/javascript"> 
// output functions are configurable.  This one just appends some text
// to a pre element.
function outf(text) { 
    var mypre = document.getElementById("output"); 
    mypre.textContent = mypre.textContent + text; 
} 
function builtinRead(x) {
    if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined)
            throw "File not found: '" + x + "'";
    return Sk.builtinFiles["files"][x];
}

function formatSkulptError(err) {
    if (!err) return "Unknown Skulpt error";
    if (err.tp$str) {
        try {
            return err.tp$str().v;
        } catch (e) {
            // Fall through to the generic formatting below.
        }
    }
    if (err.args && err.args.v && err.args.v.length) {
        return err.args.v.map(function(arg) {
            return arg && arg.v !== undefined ? arg.v : String(arg);
        }).join(" ");
    }
    if (err.name && err.message) return err.name + ": " + err.message;
    if (err.message) return err.message;
    return String(err);
}

function drawFallback() {
    var target = document.getElementById("mycanvas");
    target.innerHTML = "";

    var canvas = document.createElement("canvas");
    canvas.width = 420;
    canvas.height = 420;
    canvas.style.border = "1px solid #ccc";
    target.appendChild(canvas);

    var ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#111";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.rect(160, 160, 100, 100);
    ctx.stroke();

    ctx.strokeStyle = "#2563eb";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(40, 210);
    ctx.lineTo(380, 210);
    ctx.moveTo(210, 40);
    ctx.lineTo(210, 380);
    ctx.stroke();

    ctx.strokeStyle = "#dc2626";
    ctx.beginPath();
    for (var px = -170; px <= 170; px += 4) {
        var x = px / 34;
        var y = (x - 1) * (x - 2) * (x - 3);
        var cx = 210 + x * 34;
        var cy = 210 - y * 6;
        if (px === -170) ctx.moveTo(cx, cy);
        else ctx.lineTo(cx, cy);
    }
    ctx.stroke();
}

// Here's everything you need to run a python program in skulpt
// grab the code from your textarea
// get a reference to your pre element for output
// configure the output function
// call Sk.importMainWithBody()
function runit() { 
   var prog = document.getElementById("yourcode").value; 
   var mypre = document.getElementById("output"); 
   var canvas = document.getElementById("mycanvas");
   mypre.textContent = '';
   canvas.innerHTML = '';
   if (typeof Sk === "undefined") {
       drawFallback();
       return;
   }
   Sk.pre = "output";
   Sk.configure({output:outf, read:builtinRead}); 
   (Sk.TurtleGraphics || (Sk.TurtleGraphics = {})).target = 'mycanvas';
   var myPromise = Sk.misceval.asyncToPromise(function() {
       return Sk.importMainWithBody("<stdin>", false, prog, true);
   });
   myPromise.then(function(mod) {
       console.log('success');
   },
       function(err) {
       var message = formatSkulptError(err);
       console.warn(message);
       mypre.textContent = '';
       drawFallback();
   });
} 
</script> 

<h3>python 2.7</h3> 
<form> 
<textarea id="yourcode" cols="80" rows="50">
from turtle import Turtle


WIDTH, HEIGHT = 10, 10  # coordinate system size
tick = 0.1 # 그래프 그리기 위한 x 증분

# python의 기본 range함수는 실수 증분을 허용하지 않으므로 실수 증분을 가능하게 하는 myrange 함수를 만듬
def myrange(start, end, step):
    r = start
    while(r < end):
        yield r
        r += step

# 수식 그리는 함수
def plotter(turtle, x_range):
    turtle.penup()

    for x in x_range:
        y = (x-1)*(x-2)*(x-3) # 그리고 싶은 함수식을 적음 
        ivy.goto(x, y)
        turtle.pendown()

# 축 그리는 함수
def axis(turtle, distance):
    position = turtle.position()
    turtle.pendown()
    turtle.forward(distance)
    turtle.setposition(position)
    turtle.backward(distance)

ivy = Turtle()
ivy.speed('fastest')
ivy.hideturtle()
ivy.penup()

# 사각형 예시
ivy.goto(-4, 3)
ivy.pendown()
for i in range(4):
    ivy.forward(2)
    ivy.right(90)

ivy.penup()
ivy.home()

# x, y 축
axis(ivy, WIDTH)

ivy.penup()
ivy.home()
ivy.setpos((-0.3,-0.4))
ivy.write("0")
ivy.home()
ivy.setheading(90) #90도로 각도 전환
axis(ivy, HEIGHT)

plotter(ivy, myrange(-WIDTH//2, WIDTH//2, tick))




</textarea><br /> 
<button type="button" onclick="runit()">Run</button> 
</form> 
<pre id="output" ></pre> 
<!-- If you want turtle graphics include a canvas -->
<div id="mycanvas"></div> 

</body>
